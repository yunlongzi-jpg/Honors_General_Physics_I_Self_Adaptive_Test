<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能国际象棋</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 30px;
            backdrop-filter: blur(10px);
            max-width: 1200px;
            width: 90%;
        }

        /* 游戏信息面板 */
        .game-info {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .panel h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #3498db;
            padding-bottom: 8px;
        }

        .current-player {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1em;
            font-weight: bold;
        }

        .player-indicator {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 3px solid #2c3e50;
        }

        .player-indicator.white {
            background: white;
        }

        .player-indicator.black {
            background: #2c3e50;
        }

        /* 棋盘 */
        .board-container {
            position: relative;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 70px);
            grid-template-rows: repeat(8, 70px);
            border: 3px solid #2c3e50;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .square {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .square.light {
            background: #f0d9b5;
        }

        .square.dark {
            background: #b58863;
        }

        .square.selected {
            background: #f6f669 !important;
            box-shadow: inset 0 0 0 3px #ff6b6b;
        }

        .square.possible-move {
            position: relative;
        }

        .square.possible-move::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(0, 200, 0, 0.5);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .square.possible-capture::after {
            content: '';
            position: absolute;
            width: 65px;
            height: 65px;
            border: 3px solid rgba(255, 0, 0, 0.6);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .square.check {
            background: #ff6b6b !important;
        }

        /* 棋子样式 */
        .piece {
            font-size: 50px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s ease;
            z-index: 10;
        }

        .piece:hover {
            transform: scale(1.1);
        }

        .piece.dragging {
            opacity: 0.5;
            transform: scale(1.2);
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.secondary {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            box-shadow: 0 4px 15px rgba(149, 165, 166, 0.3);
        }

        .btn.danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

        /* 历史记录 */
        .move-history {
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border-radius: 8px;
            padding: 10px;
        }

        .move-item {
            padding: 5px;
            border-bottom: 1px solid #ecf0f1;
            font-size: 0.9em;
        }

        .move-item:last-child {
            border-bottom: none;
        }

        .move-number {
            font-weight: bold;
            color: #3498db;
            margin-right: 10px;
        }

        /* 游戏状态 */
        .game-status {
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .game-status.checkmate {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .game-status.stalemate {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
        }

        /* AI 难度选择 */
        .ai-difficulty {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .difficulty-btn {
            padding: 8px 15px;
            background: white;
            border: 2px solid #3498db;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .difficulty-btn:hover {
            background: #3498db;
            color: white;
        }

        .difficulty-btn.active {
            background: #3498db;
            color: white;
            font-weight: bold;
        }

        /* 提示信息 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 25px;
            border-radius: 25px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }

        /* 坐标标记 */
        .coordinates {
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            color: #2c3e50;
        }

        .file-coordinates {
            bottom: -25px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
        }

        .rank-coordinates {
            left: -25px;
            top: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
        }

        /* 兵升变弹窗 */
        .promotion-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .promotion-modal.show {
            display: flex;
        }

        .promotion-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }

        .promotion-pieces {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .promotion-piece {
            font-size: 60px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .promotion-piece:hover {
            transform: scale(1.2);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                padding: 20px;
            }

            .game-info {
                width: 100%;
                max-width: 400px;
            }

            .chess-board {
                grid-template-columns: repeat(8, 50px);
                grid-template-rows: repeat(8, 50px);
            }

            .square {
                width: 50px;
                height: 50px;
            }

            .piece {
                font-size: 35px;
            }

            .file-coordinates, .rank-coordinates {
                display: none;
            }
        }

        /* 加载动画 */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .thinking {
            animation: pulse 1.5s infinite;
        }

        /* 统计信息 */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            text-align: center;
        }

        .stat-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #3498db;
        }

        .stat-label {
            font-size: 0.9em;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 游戏信息面板 -->
        <div class="game-info">
            <div class="panel">
                <h3>游戏状态</h3>
                <div class="current-player">
                    <div class="player-indicator" id="current-player-indicator"></div>
                    <span id="current-player-text">白方</span>
                </div>
                <div class="game-status" id="game-status">游戏进行中</div>
            </div>

            <div class="panel">
                <h3>AI 难度</h3>
                <div class="ai-difficulty">
                    <div class="difficulty-btn active" data-level="easy">简单</div>
                    <div class="difficulty-btn" data-level="medium">中等</div>
                    <div class="difficulty-btn" data-level="hard">困难</div>
                    <div class="difficulty-btn" data-level="expert">专家</div>
                </div>
            </div>

            <div class="panel">
                <h3>游戏控制</h3>
                <div class="controls">
                    <button class="btn" id="new-game-btn">新游戏</button>
                    <button class="btn secondary" id="undo-btn">悔棋</button>
                    <button class="btn secondary" id="hint-btn">提示</button>
                    <button class="btn danger" id="resign-btn">认输</button>
                </div>
            </div>

            <div class="panel">
                <h3>游戏统计</h3>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="move-count">0</div>
                        <div class="stat-label">步数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="captured-count">0</div>
                        <div class="stat-label">吃子</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="time-elapsed">00:00</div>
                        <div class="stat-label">用时</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="evaluation">0.0</div>
                        <div class="stat-label">评估</div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h3>走棋记录</h3>
                <div class="move-history" id="move-history">
                    <div class="move-item">游戏开始</div>
                </div>
            </div>
        </div>

        <!-- 棋盘区域 -->
        <div class="board-container">
            <div class="file-coordinates">
                <span>a</span><span>b</span><span>c</span><span>d</span>
                <span>e</span><span>f</span><span>g</span><span>h</span>
            </div>
            <div class="rank-coordinates">
                <span>8</span><span>7</span><span>6</span><span>5</span>
                <span>4</span><span>3</span><span>2</span><span>1</span>
            </div>
            <div class="chess-board" id="chess-board"></div>
        </div>
    </div>

    <!-- 兵升变弹窗 -->
    <div class="promotion-modal" id="promotion-modal">
        <div class="promotion-content">
            <h3>选择升变的棋子</h3>
            <div class="promotion-pieces" id="promotion-pieces"></div>
        </div>
    </div>

    <!-- 提示信息 -->
    <div class="toast" id="toast"></div>

    <script src="chess.js"></script>
</body>
</html>
